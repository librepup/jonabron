[colors]
background = #2C2338
background-alt = #3A2F4A
foreground = #E8C4E8
primary = #D8A6E0
marniePrimary = #ff2a54
helltakerPrimary = #FC2171
demePrimary = #E4810D
nixPrimary = #7db6e2
filianPrimary = #E0E0E0
secondary = #C4A8D8
alert = #FF6B9D
disabled = #7A6A8C
accent-white = #F0C8FF
accent-white-transparent = #65F0C8FF
accent-green = #B8E0B8
accent-green-transparent = #65B8E0B8
accent-green-light = #B8E0B8
accent-blue = #A8D0E0
accent-blue-transparent = #65A8D0E0
accent-blue-pastel = #B8E0E8
accent-purple = #D8A6E0
accent-purple-transparent = #65D8A6E0
accent-red = #FF8EC6
accent-red-transparent = #65FF8EC6
accent-red-translucent = #85FF8EC6
accent-red-dark = #FF6B9D
accent-red-dark-transparent = #65FF6B9D
accent-brown = #D4A080
accent-brown-transparent = #65D4A080

[bar/main]
width = 100%
height = 18pt
radius = 0
monitor = ${env:MONITOR:}
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 0pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 4px
separator = ""
separator-foreground = ${colors.foreground}
locale = de_DE.UTF-8
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = "Cartograph CF:style=Bold:size=14;2"
font-1 = "Symbols Nerd Font:size=14;2"
font-2 = "TempleOS:size=8;2"
font-3 = "monospace:size=11;2"
font-4 = "DejaVu Sans Mono:size=14;2"

modules-left = icon xworkspaces outro memory separator cpu separator gpu separator disk-root separator disk-mnt separator disk-extra
modules-right = pulseaudio separator inet separator xmonad-layout separator tray-toggle intro date
modules-center = xwindow

[module/intro]
type = custom/text
content = "<<"
content-font = 1
content-margin = 0px
content-foreground = ${colors.foreground}

[module/outro]
type = custom/text
content = ">>"
content-font = 1
content-margin = 0px
content-foreground = ${colors.foreground}

[module/separator]
type = custom/text
content = ":"
content-font = 1
content-margin = 0px
content-foreground = ${colors.primary}

[module/tray-toggle]
type = custom/text
content = "Ņ¬┤"
content-foreground = ${colors.primary}
click-left = jonabar tray

[module/xmonad-layout]
type = custom/script
exec = tail -F /tmp/.xmonad-layout-log 2>/dev/null | sed -u 's/.*Spiral.*/Spiral/;s/.*Tall.*/Multi/;s/.*Tabbed.*/Tab/;s/.*Accordion.*/Accordion/;s/.*Circle.*/Circle/'
tail = true
label-font = 1
label = ŅŁ┐ %{F#D8A6E0}%output%%{F-}
format-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
label-charging = ¾░óØ %{F-} %{F#D8A6E0}%percentage%%%{F-}
label-charging-foreground = ${colors.primary}
label-discharging = ¾▒¤× %{F-} %{F#D8A6E0}%percentage%%%{F-}
label-discharging-foreground = ${colors.primary}
label-full = ¾░ü╣ %{F-} %{F#D8A6E0}Full%{F-}
label-full-foreground = ${colors.primary}

[module/icon]
type = custom/script
interval = 31556952
exec = bash -c 'echo "%{F#D8A6E0} ¾░¦╗%{F-}"'
label = %output%
label-foreground = ${colors.primary}

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = #2C2338
label-active-background = #D8A6E0
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = #D8A6E0
label-occupied-background = ${colors.background}
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty =
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:10:...%

[module/disk-root]
type = custom/script
interval = 1
exec = bash -c 'state_file=/tmp/polybar_disk_root_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h / | awk '"'"'NR==2 {print "%{F#D8A6E0}¾░ŗŖ%{F#E8C4E8} " $5 }'"'"'; else df -h / | sed "s/G//g" | awk '"'"'NR==2 {print "%{F#D8A6E0}¾░ŗŖ %{F#C4A8D8}[%{F#D8A6E0}/%{F#C4A8D8}] %{F#C4A8D8}[%{F#D8A6E0}" $3 "%{F#E8C4E8}GiB%{F#F0C8FF}/%{F#D8A6E0}" $2 "%{F#E8C4E8}GiB%{F#C4A8D8}]"}'"'"'; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_root_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/disk-mnt]
type = custom/script
interval = 1
exec = bash -c 'if df -h /mnt >/dev/null 2>&1; then state_file=/tmp/polybar_disk_mnt_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h /mnt | awk '\''NR==2 {print "%{F#D8A6E0}¾▒üŗ%{F#E8C4E8} " $5 }'\''; else df -h /mnt | sed "s/G//g" | awk '\''NR==2 {print "%{F#D8A6E0}¾▒üŗ %{F#C4A8D8}[%{F#D8A6E0}/mnt%{F#C4A8D8}] %{F#C4A8D8}[%{F#D8A6E0}" $3 "%{F#E8C4E8}GiB%{F#F0C8FF}/%{F#D8A6E0}" $2 "%{F#E8C4E8}GiB%{F#C4A8D8}]"}'\''; fi; else echo "%{F#F0C8FF}¾▒üī %{F#FF6B9D}No /mnt"; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_mnt_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/disk-extra]
type = custom/script
interval = 1
exec = bash -c 'if df -h /extra >/dev/null 2>&1; then state_file=/tmp/polybar_disk_extra_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h /extra | awk '\''NR==2 {print "%{F#D8A6E0}¾▒üŗ%{F#E8C4E8} " $5 }'\''; else df -h /extra | sed "s/G//g" | awk '\''NR==2 {print "%{F#D8A6E0}¾▒üŗ %{F#C4A8D8}[%{F#D8A6E0}/extra%{F#C4A8D8}] %{F#C4A8D8}[%{F#D8A6E0}" $3 "%{F#E8C4E8}GiB%{F#F0C8FF}/%{F#D8A6E0}" $2 "%{F#E8C4E8}GiB%{F#C4A8D8}]"}'\''; fi; else echo "%{F#F0C8FF}¾▒üī %{F#FF6B9D}No /extra"; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_extra_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "’Ć© "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
format-volume-foreground = ${colors.primary}
label-volume = %{F#E8C4E8}%percentage%%
label-volume-foreground = ${colors.primary}
label-muted = %{F#F0C8FF}’Ć© %{F#FF6B9D}Mute%{F-}
label-muted-foreground = ${colors.primary}
click-right = bash -c 'if command -v pactl > /dev/null && command -v dmenu > /dev/null; then chosen=$(seq 0 5 150 | awk "{print \$1\"%\"}" | dmenu -nb '"'"'#2C2338'"'"' -nf '"'"'#C4A8D8'"'"' -sf '"'"'#2C2338'"'"' -sb '"'"'#D8A6E0'"'"' -fn '"'"'DejaVu Sans Mono:size=14'"'"' -p '"'"'%:'"'"'); [ -n "$chosen" ] && pactl set-sink-volume @DEFAULT_SINK@ "$chosen"; elif command -v pavucontrol > /dev/null; then pavucontrol; else notify-send "Jonabar" "No Volume Application Found"; fi'
click-middle = bash -c 'if command -v pavucontrol > /dev/null; then pavucontrol; else notify-send "Jonabar" "No Volume Application Found"; fi'

[module/memory]
type = custom/script
interval = 5
exec = echo "%{F#D8A6E0}Ņ┐ģ %{F#E8C4E8}$(awk '/^MemTotal:/ { t=$2 } /^MemAvailable:/ { a=$2 } END { printf("%.0f%%\n", (t-a)/t*100) }' /proc/meminfo)"
label = %output%
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 btop & kittyPid=$! && notify-send "Jonabar" "Launched BTop\n(PID: $kittyPid)"

[module/cpu]
type = custom/script
interval = 5
exec = echo "%{F#E8C4E8}$(mpstat 1 1 | awk '$12 ~ /[0-9.]+/ { print 100 - $12 }' | awk 'NR==2' | awk '{printf "%.0f\n", $1}')%"
label = ’Æ╝ %output%
label-foreground = ${colors.primary}
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 btm --theme gruvbox & kittyPid=$\! && notify-send "Jonabar" "Launched Bottom\n(PID: $kittyPid)"

[module/gpu]
type = custom/script
interval = 30
exec = bash -c 'if command -v nvidia-smi > /dev/null; then nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '"'"'{print "%{F#D8A6E0}Ņē” %{F#E8C4E8}" $1"%"}'"'"'; else echo "%{F#F0C8FF}ŅÖö %{F#FF6B9D}No GPU%{F-}"; fi'
label = %output%
label-foreground = ${colors.primary}
click-right = kitty --title FLOAT_ME_NOW -o font_family=TempleOS -o font_size=8 bash -c 'watch -n 1 nvidia-smi & WATCH_PID=$!; read -n 1 -s; kill $WATCH_PID' & notify-send "Jonabar" "Launched Nvidia-SMI"

[module/inet]
type = custom/script
exec = INETSTATUSREPLACEMENTTEXT14171209
tail = true
label-foreground = ${colors.primary}

[module/date]
type = custom/script
exec = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}$(date +"%a %d.%m") %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}$(date +"%a %d.%m") %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/├ż/a/g;s/├Č/o/g;s/├╝/u/g;s/├ä/a/g;s/├£/u/g;s/├¢/o/g"); echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}${D} %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M:%S")"; fi ;; esac' -- "output"
interval = 1
label = %output%
click-left = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}$(date +"%a %d.%m") %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}$(date +"%a %d.%m") %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/├ż/a/g;s/├Č/o/g;s/├╝/u/g;s/├ä/a/g;s/├£/u/g;s/├¢/o/g"); echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}${D} %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M:%S")"; fi ;; esac' -- "switch"
click-right = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}$(date +"%a %d.%m") %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}$(date +"%a %d.%m") %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/├ż/a/g;s/├Č/o/g;s/├╝/u/g;s/├ä/a/g;s/├£/u/g;s/├¢/o/g"); echo "%{F#D8A6E0}¾░Ł© %{F#E8C4E8}${D} %{F#D8A6E0}’ĆŚ %{F#E8C4E8}$(date +"%H:%M:%S")"; fi ;; esac' -- "reset"
hook-0 = 1
label-font = 2
click-middle = bash -c 'choice=$(echo -e "Logout\nReboot\nShutdown" | dmenu -nb '"'"'#2C2338'"'"' -nf '"'"'#C4A8D8'"'"' -sf '"'"'#2C2338'"'"' -sb '"'"'#D8A6E0'"'"' -fn '"'"'DejaVu Sans Mono:size=14'"'"' -p '"'"'%:'"'"'); [[ -z "$choice" ]] && exit 0; confirm=$(echo -e "No\nYes" | dmenu -nb '"'"'#2C2338'"'"' -nf '"'"'#C4A8D8'"'"' -sf '"'"'#2C2338'"'"' -sb '"'"'#D8A6E0'"'"' -fn '"'"'DejaVu Sans Mono:size=14'"'"' -p '"'"'Are you sure?'"'"'); if [[ "$confirm" != "Yes" ]]; then exit 0; fi; case "$choice" in "Logout") pkill -KILL -u $USER ;; "Reboot") reboot ;; "Shutdown") poweroff ;; esac'

[module/tray]
type = internal/tray
format-margin = 6px
tray-spacing = 8px

[settings]
screenchange-reload = true
pseudo-transparency = true
