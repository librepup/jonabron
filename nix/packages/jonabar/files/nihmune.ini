[colors]
background = #801D1F21
background-alt = #373B41
foreground = #EDB6DB
primary = #F186AD
secondary = #8ABEB7
alert = #A54242
disabled = #707880
accent = #e75b98
red = #F04535
purple = #AE49AA

[bar/main]
width = 100%
height = 18pt
radius = 0
monitor = ${env:MONITOR:}
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 0pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 4px
separator = ""
separator-foreground = ${colors.foreground}
locale = de_DE.UTF-8
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = "Cartograph CF:style=Bold:size=14;2"
font-1 = "Symbols Nerd Font:size=14;2"
font-2 = "monospace:size=11;2"
font-3 = "DejaVu Sans Mono:size=14;2"

modules-left = icon xworkspaces outro memory separator cpu separator gpu separator disk-root separator disk-mnt separator disk-extra
modules-right = pulseaudio separator inet separator xmonad-layout separator tray-toggle intro date
modules-center = xwindow

[module/intro]
type = custom/text
content = "<<"
content-font = 1
content-margin = 0px
content-foreground = ${colors.red}

[module/outro]
type = custom/text
content = ">>"
content-font = 1
content-margin = 0px
content-foreground = ${colors.red}

[module/separator]
type = custom/text
content = ":"
content-font = 1
content-margin = 0px
content-foreground = ${colors.foreground}

[module/tray-toggle]
type = custom/text
content = ""
content-foreground = ${colors.primary}
click-left = jonabar-toggle-tray

[module/xmonad-layout]
type = custom/script
exec = tail -F /tmp/.xmonad-layout-log 2>/dev/null | sed -u 's/.*Spiral.*/Spiral/;s/.*Tall.*/Multi/;s/.*Tabbed.*/Tab/;s/.*Accordion.*/Accordion/;s/.*Circle.*/Circle/'
tail = true
label-font = 1
label =  %{F#e75b98}%output%%{F-}
format-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
label-charging = 󰢝 %{F-} %{F#e75b98}%percentage%%%{F-}
label-charging-foreground = ${colors.primary}
label-discharging = 󱟞 %{F-} %{F#e75b98}%percentage%%%{F-}
label-discharging-foreground = ${colors.primary}
label-full = 󰁹 %{F-} %{F#e75b98}Full%{F-}
label-full-foreground = ${colors.primary}

[module/icon]
type = custom/script
exec = bash -c 'echo "%{F#e75b98} "'
label = %output%
label-foreground = ${colors.accent}

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = #000000
label-active-background = #F186AD
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = #F186AD
label-occupied-background = ${colors.background}
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty =
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:10:...%

[module/disk-root]
type = custom/script
interval = 1
exec = bash -c 'state_file=/tmp/polybar_disk_root_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h / | awk '"'"'NR==2 {print "%{F#F186AD}󰋊%{F#e75b98} " $5 }'"'"'; else df -h / | sed "s/G//g" | awk '"'"'NR==2 {print "%{F#F186AD}󰋊 %{F#bcedf5}[%{F#F186AD}/%{F#bcedf5}] %{F#bcedf5}[%{F#F186AD}" $3 "%{F#e75b98}GiB%{F#f5e8d5}/%{F#F186AD}" $2 "%{F#e75b98}GiB%{F#bcedf5}]"}'"'"'; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_root_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/disk-mnt]
type = custom/script
interval = 1
exec = bash -c 'if df -h /mnt >/dev/null 2>&1; then state_file=/tmp/polybar_disk_mnt_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h /mnt | awk '\''NR==2 {print "%{F#F186AD}󱁋%{F#e75b98} " $5 }'\''; else df -h /mnt | sed "s/G//g" | awk '\''NR==2 {print "%{F#F186AD}󱁋 %{F#bcedf5}[%{F#F186AD}/mnt%{F#bcedf5}] %{F#bcedf5}[%{F#F186AD}" $3 "%{F#e75b98}GiB%{F#f5e8d5}/%{F#F186AD}" $2 "%{F#e75b98}GiB%{F#bcedf5}]"}'\''; fi; else echo "%{F#f5e8d5}󱁌 %{F#F04535}No /mnt"; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_mnt_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/disk-extra]
type = custom/script
interval = 1
exec = bash -c 'if df -h /mnt >/dev/null 2>&1; then state_file=/tmp/polybar_disk_extra_state; [ -f "$state_file" ] || echo 0 > "$state_file"; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then df -h /extra | awk '\''NR==2 {print "%{F#F186AD}󱁋%{F#e75b98} " $5 }'\''; else df -h /extra | sed "s/G//g" | awk '\''NR==2 {print "%{F#F186AD}󱁋 %{F#bcedf5}[%{F#F186AD}/extra%{F#bcedf5}] %{F#bcedf5}[%{F#F186AD}" $3 "%{F#e75b98}GiB%{F#f5e8d5}/%{F#F186AD}" $2 "%{F#e75b98}GiB%{F#bcedf5}]"}'\''; fi; else echo "%{F#f5e8d5}󱁌 %{F#F04535}No /extra"; fi'
click-left = bash -c 'state_file=/tmp/polybar_disk_extra_state; state=$(cat "$state_file"); if [ "$state" -eq 0 ]; then echo 1 > "$state_file"; else echo 0 > "$state_file"; fi'
label = %output%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
format-volume-foreground = ${colors.primary}
label-volume = %{F#e75b98}%percentage%%
label-volume-foreground = ${colors.primary}
label-muted = %{F#f5e8d5} %{F#F04535}Mute%{F-}
label-muted-foreground = ${colors.primary}
click-right = pavucontrol

[module/memory]
type = custom/script
interval = 5
exec = echo "%{F#F186AD} %{F#e75b98}$(awk '/^MemTotal:/ { t=$2 } /^MemAvailable:/ { a=$2 } END { printf("%.0f%%\n", (t-a)/t*100) }' /proc/meminfo)"
label = %output%
click-right = kitty --title FLOAT_ME_NOW -o font_size=10 btop

[module/cpu]
type = custom/script
interval = 5
exec = echo "%{F#e75b98}$(mpstat 1 1 | awk '$12 ~ /[0-9.]+/ { print 100 - $12 }' | awk 'NR==2' | awk '{printf "%.0f\n", $1}')%"
label =  %output%
label-foreground = ${colors.primary}
click-right = kitty --title FLOAT_ME_NOW -o font_size=10 btm --theme default

[module/gpu]
type = custom/script
interval = 30
exec = bash -c 'if command -v nvidia-smi > /dev/null; then nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '"'"'{print "%{F#F186AD} %{F#e75b98}" $1"%"}'"'"'; else echo "%{F#f5e8d5} %{F#F04535}No GPU%{F-}"; fi'
label = %output%
label-foreground = ${colors.primary}
click-right = kitty -o font_size=10 --title FLOAT_ME_NOW bash -c 'watch -n 1 "nvidia-smi" & notify-send "Jonabar" "Launched NmCLI"; read -n 1 -s'

[module/inet]
type = custom/script
interval = 960
exec = bash -c 'NM=$(if [ -x "/run/current-system/sw/bin/nmcli" ]; then echo "/run/current-system/sw/bin/nmcli"; else echo "nmcli"; fi); dev_info=$($NM -t -f DEVICE,TYPE,STATE,CONNECTION dev | grep ":connected" | grep -Ev "^(lo|docker|virbr|veth):" | head -n1); if [ -z "$dev_info" ]; then echo "%{F#f5e8d5}󱚼 %{F#F04535}Disconnected"; else IFS=: read -r dev type state conn <<< "$dev_info"; case "$type" in ethernet) ip=$($NM -g IP4.ADDRESS device show "$dev" | cut -d/ -f1 | head -n1); echo "󰈀 %{F#e75b98}$ip"; ;; wifi) echo "󰖩 %{F#e75b98}$conn"; ;; *) echo "󱚼 %{F#e75b98}Disconnected"; ;; esac; fi'
label = %output%
label-foreground = ${colors.primary}
click-right = kitty -o font_size=10 --title FLOAT_ME_NOW bash -c 'watch -n 1 "nmcli device show" && read & notify-send "Jonabar" "Launched NmCLI"; read -n 1 -s'

[module/date]
type = custom/script
exec = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#F186AD}󰭨 %{F#e75b98}$(date +"%a %d.%m") %{F#F186AD} %{F#e75b98}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#F186AD}󰭨 %{F#e75b98}$(date +"%a %d.%m") %{F#F186AD} %{F#e75b98}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#F186AD} %{F#e75b98}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/ä/a/g;s/ö/o/g;s/ü/u/g;s/Ä/a/g;s/Ü/u/g;s/Ö/o/g"); echo "%{F#F186AD}󰭨 %{F#e75b98}${D} %{F#F186AD} %{F#e75b98}$(date +"%H:%M:%S")"; fi ;; esac' -- "output"
interval = 1
label = %output%
click-left = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#F186AD}󰭨 %{F#e75b98}$(date +"%a %d.%m") %{F#F186AD} %{F#e75b98}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#F186AD}󰭨 %{F#e75b98}$(date +"%a %d.%m") %{F#F186AD} %{F#e75b98}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#F186AD} %{F#e75b98}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/ä/a/g;s/ö/o/g;s/ü/u/g;s/Ä/a/g;s/Ü/u/g;s/Ö/o/g"); echo "%{F#F186AD}󰭨 %{F#e75b98}${D} %{F#F186AD} %{F#e75b98}$(date +"%H:%M:%S")"; fi ;; esac' -- "switch"
click-right = bash -c 'S="$HOME/.cache/polybar-date-toggle"; [ ! -f "$S" ] && echo "normal" > "$S"; M="$1"; case "$M" in switch) C=$(cat "$S"); if [ "$C" = "normal" ]; then echo "alt" > "$S"; elif [ "$C" = "alt" ]; then echo "short" > "$S"; else echo "normal" > "$S"; fi; polybar-msg hook date 1 ;; reset) echo "normal" > "$S"; echo "%{F#F186AD}󰭨 %{F#e75b98}$(date +"%a %d.%m") %{F#F186AD} %{F#e75b98}$(date +"%H:%M")" ;; *) T=$(cat "$S"); if [ "$T" = "normal" ]; then echo "%{F#F186AD}󰭨 %{F#e75b98}$(date +"%a %d.%m") %{F#F186AD} %{F#e75b98}$(date +"%H:%M")"; elif [ "$T" = "alt" ]; then echo "%{F#F186AD} %{F#e75b98}$(date +"%H:%M")"; else D=$(date +"%A, %d. %B" | sed "s/ä/a/g;s/ö/o/g;s/ü/u/g;s/Ä/a/g;s/Ü/u/g;s/Ö/o/g"); echo "%{F#F186AD}󰭨 %{F#e75b98}${D} %{F#F186AD} %{F#e75b98}$(date +"%H:%M:%S")"; fi ;; esac' -- "reset"
hook-0 = 1
label-font = 2

[module/tray]
type = internal/tray
format-margin = 6px
tray-spacing = 8px

[settings]
screenchange-reload = true
pseudo-transparency = true
